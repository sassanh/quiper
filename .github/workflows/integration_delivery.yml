name: CI/CD

on:
  push:
    branches:
      - main
      - development
    tags:
      - "v*"
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  nightly-preflight:
    name: Nightly Preflight
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check if nightly build is needed
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Non-scheduled workflow (${{ github.event_name }}). Proceeding with build."
            echo "should_run=true" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST=$(gh release list --limit 50 --json tagName,publishedAt,body \
            --jq '[.[] | select(.tagName | startswith("nightly-"))][0]')

          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "No previous nightly release found. Proceeding with build."
            echo "should_run=true" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          BODY=$(echo "$LATEST" | jq -r '.body // ""')
          PUBLISHED_AT=$(echo "$LATEST" | jq -r '.publishedAt')
          TAG=$(echo "$LATEST" | jq -r '.tagName')

          LAST_SHA=$(echo "$BODY" | grep -oE '<!-- Commit: [a-f0-9]+ -->' | head -1 | sed 's/<!-- Commit: //;s/ -->//' || true)
          if [ -z "$LAST_SHA" ]; then
            LAST_SHA=$(echo "$BODY" | grep -oE 'Commit: [a-f0-9]+' | head -1 | sed 's/Commit: //' || true)
          fi

          PUBLISHED_EPOCH=$(date -d "$PUBLISHED_AT" +%s)
          NOW_EPOCH=$(date +%s)
          AGE_HOURS=$(( (NOW_EPOCH - PUBLISHED_EPOCH) / 3600 ))

          HAS_CHANGES=true
          if [ -n "$LAST_SHA" ] && [ "$LAST_SHA" = "$CURRENT_SHA" ]; then
            HAS_CHANGES=false
          fi

          if [ "$HAS_CHANGES" = "true" ]; then
            echo "Changes detected since last nightly ($TAG). Proceeding."
            echo "should_run=true" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$AGE_HOURS" -lt 72 ]; then
            echo "No changes since last nightly ($TAG @ $LAST_SHA) and last release was ${AGE_HOURS}h ago (< 72h). Skipping."
            echo "should_run=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No changes since last nightly, but last release was ${AGE_HOURS}h ago (>= 72h). Proceeding with periodic rebuild."
          echo "should_run=true" >>"$GITHUB_OUTPUT"

  tests:
    name: Tests
    needs: nightly-preflight
    if: needs.nightly-preflight.outputs.should_run == 'true'
    runs-on: macos-26
    environment:
      name: test
      url: https://app.codecov.io/gh/${{ github.repository }}/
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode 26.1.1
        run: sudo xcode-select -s /Applications/Xcode_26.1.1.app

      - name: Toolchain info
        run: |
          swift --version
          xcodebuild -version

      - name: Run tests with coverage
        run: ./tests-with-coverage.sh CODE_SIGN_IDENTITY="-" DEVELOPMENT_TEAM="" -retry-tests-on-failure -test-iterations 2

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.lcov
          fail_ci_if_error: true
          flags: unittests
          root_dir: ${{ github.workspace }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage-html

      - name: Upload Test Result Bundle
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: TestResult.xcresult
          path: build/DerivedData/TestResult.xcresult
          if-no-files-found: ignore

  build:
    name: Build
    runs-on: macos-26
    needs: tests
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
      - name: Set release app version
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          VERSION_BASE=$(git tag -l 'v*' --sort=-v:refname | head -1 | sed 's/^v//')
          if [ -z "$VERSION_BASE" ]; then
            VERSION_BASE=$(grep -m1 'MARKETING_VERSION = ' Quiper.xcodeproj/project.pbxproj | sed -E 's/.*MARKETING_VERSION = ([^;]+);/\1/' | tr -d ' ')
          fi
          SUFFIX=$(if [ "${{ github.event_name }}" == "schedule" ]; then echo "nightly"; else echo "beta"; fi)
          # Clean version base to prevent duplicate suffixes (e.g. beta-beta or nightly-nightly)
          CLEAN_BASE=$(echo "$VERSION_BASE" | sed "s/-$SUFFIX//g; s/$SUFFIX//g")
          if [ -z "$CLEAN_BASE" ]; then
            CLEAN_BASE="0.0.0"
          fi
          echo "APP_VERSION=${CLEAN_BASE}-${SUFFIX}-nonproduction" >>"$GITHUB_ENV"
      - name: Install Apple Certificate
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE }}
          P12_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: "temporary-keychain-password"
        run: |
          if [ -z "$BUILD_CERTIFICATE_BASE64" ]; then
            echo "⚠️ No certificate found. Skipping Apple Certificate installation and falling back to ad-hoc signing."
            exit 0
          fi

          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode the certificate cleanly
          echo "$BUILD_CERTIFICATE_BASE64" | tr -d '\r\n ' | base64 --decode -o "$CERTIFICATE_PATH"

          # Create and unlock temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Import certificate to keychain
          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Dynamically resolve and set the signing identity
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -E 'Apple Development|Mac Developer|Developer ID Application' | head -n 1 | grep -oE '"[^"]+"' | tr -d '"')
          echo "RESOLVED_IDENTITY=$IDENTITY" >> $GITHUB_ENV
          
          # Extract actual Team ID from the certificate's Organizational Unit (OU) metadata
          TEAM_ID=$(security find-certificate -c "$IDENTITY" -p "$KEYCHAIN_PATH" | openssl x509 -text -noout | grep -i 'Subject: ' | grep -oE 'OU=[A-Z0-9]+' | cut -d= -f2 | head -n 1)
          echo "RESOLVED_TEAM=$TEAM_ID" >> $GITHUB_ENV
          
          echo "🎉 Successfully imported certificate: $IDENTITY (Team: $TEAM_ID)"

      - name: Build Swift App
        env:
          SIGNING_IDENTITY: ${{ env.RESOLVED_IDENTITY || '-' }}
          DEVELOPMENT_TEAM: ${{ env.RESOLVED_TEAM }}
        run: ./build-app.sh
      - name: Notarize and Staple App
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          DEVELOPMENT_TEAM: ${{ env.RESOLVED_TEAM }}
        run: |
          if [ -z "${APPLE_ID:-}" ] || [ -z "${APPLE_PASSWORD:-}" ] || [ -z "${DEVELOPMENT_TEAM:-}" ]; then
            echo "⚠️ Skipping Apple Notarization: Missing APPLE_ID, APPLE_PASSWORD, or RESOLVED_TEAM secret/env."
            exit 0
          fi

          echo "📦 Preparing Quiper.app for Apple Notarization..."
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent Quiper.app Quiper-notarize.zip

          echo "🚀 Submitting to Apple Notarization Service..."
          xcrun notarytool submit Quiper-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$DEVELOPMENT_TEAM" \
            --wait | tee notary_output.log

          # Extract submission ID from output
          SUBMISSION_ID=$(grep -E 'id: [a-f0-9-]{36}' notary_output.log | head -n 1 | awk '{print $2}')

          if grep -q "status: Accepted" notary_output.log; then
            echo "🎉 Notarization succeeded!"
          else
            echo "❌ Notarization failed! Apple's diagnostic log:"
            if [ -n "$SUBMISSION_ID" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_PASSWORD" \
                --team-id "$DEVELOPMENT_TEAM"
            else
              echo "Could not parse Submission ID from output."
            fi
            exit 1
          fi

          echo "📎 Stapling Notarization ticket to Quiper.app..."
          xcrun stapler staple Quiper.app

          echo "🧹 Cleaning up temporary zip..."
          rm Quiper-notarize.zip notary_output.log
          echo "🎉 Successfully Notarized and Stapled!"
      - name: Create DMG Disk Image
        run: |
          mkdir -p build/dmgstaging
          cp -R Quiper.app build/dmgstaging/
          ln -s /Applications build/dmgstaging/Applications
          hdiutil create -volname "Quiper" -srcfolder build/dmgstaging -ov -format UDZO Quiper.dmg
      - name: Create ZIP Archive
        run: |
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent Quiper.app Quiper.app.zip
      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Quiper.dmg
          path: Quiper.dmg
          archive: false
          if-no-files-found: error
      - name: Upload ZIP Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Quiper.app.zip
          path: Quiper.app.zip
          archive: false
          if-no-files-found: error

      - name: Clean up Keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          if [ -f "$KEYCHAIN_PATH" ]; then
            echo "Cleaning up temporary keychain..."
            security delete-keychain "$KEYCHAIN_PATH" || true
          else
            echo "No temporary keychain to clean up."
          fi

  nightly-release:
    if: github.event_name == 'schedule'
    name: Nightly Pre-release
    runs-on: macos-latest
    needs:
      - build
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: Quiper.dmg
          path: artifacts
      - uses: actions/download-artifact@v8
        with:
          name: Quiper.app.zip
          path: artifacts
          skip-decompress: true
      - name: Generate unique tag
        id: tag
        run: |
          VERSION_BASE=$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || echo "v0.0.0")
          CLEAN_BASE=$(echo "$VERSION_BASE" | sed "s/-nightly//g; s/-beta//g; s/nightly//g; s/beta//g")
          echo "tag=nightly-${CLEAN_BASE}-${{ github.run_number }}" >>"$GITHUB_OUTPUT"
      - name: Create release notes
        env:
          STARTED_AT: ${{ github.run_started_at }}
          SHA: ${{ github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          cat <<EOF >release_notes.md
          **Automated nightly build** from the latest \`main\` branch.

          Built on: $STARTED_AT
          Commit: $SHA

          ⚠️ This is a pre-release build for testing purposes only.
          <!-- Commit: $SHA -->
          <!-- BuildNumber: $RUN_NUMBER -->
          EOF
      - name: Create Nightly Pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ steps.tag.outputs.tag }} artifacts/* \
            --title "Quiper Nightly Build (${{ steps.tag.outputs.tag }})" \
            --notes-file release_notes.md \
            --prerelease
      - name: Delete previous nightly releases
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release list --limit 200 --json tagName \
            --jq '.[].tagName | select(startswith("nightly-"))' \
          | while IFS= read -r tag; do
              [ -z "$tag" ] && continue
              [ "$tag" = "$CURRENT_TAG" ] && continue
              echo "Deleting old nightly release: $tag"
              gh release delete "$tag" --yes --cleanup-tag
            done

  beta-release:
    if: github.event_name == 'workflow_dispatch'
    name: Beta Pre-release
    runs-on: macos-latest
    needs:
      - build
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: Quiper.dmg
          path: artifacts
      - uses: actions/download-artifact@v8
        with:
          name: Quiper.app.zip
          path: artifacts
          skip-decompress: true
      - name: Generate unique tag
        id: tag
        run: |
          VERSION_BASE=$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || echo "v0.0.0")
          CLEAN_BASE=$(echo "$VERSION_BASE" | sed "s/-nightly//g; s/-beta//g; s/nightly//g; s/beta//g")
          echo "tag=beta-${CLEAN_BASE}-${{ github.run_number }}" >>"$GITHUB_OUTPUT"
      - name: Create release notes
        env:
          STARTED_AT: ${{ github.run_started_at }}
          SHA: ${{ github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          cat << EOF > release_notes.md
          **Manual beta build** for feature testing.

          Built on: $STARTED_AT
          Commit: $SHA

          ⚠️ This is a pre-release build for testing purposes only.
          <!-- BuildNumber: $RUN_NUMBER -->
          EOF
      - name: Create Beta Pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ steps.tag.outputs.tag }} artifacts/* \
            --title "Quiper Beta Build (${{ steps.tag.outputs.tag }})" \
            --notes-file release_notes.md \
            --prerelease

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    name: Publish Release
    runs-on: macos-latest
    needs:
      - build
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: Quiper.dmg
          path: artifacts
      - uses: actions/download-artifact@v8
        with:
          name: Quiper.app.zip
          path: artifacts
          skip-decompress: true
      - name: Determine Release Version
        id: release_version
        run: echo "value=${GITHUB_REF_NAME#v}" >>"$GITHUB_OUTPUT"
        shell: bash
      - name: Read changelog entry
        id: changelog_reader
        uses: mindsers/changelog-reader-action@v2
        with:
          version: ${{ steps.release_version.outputs.value }}
          path: ./CHANGELOG.md
      - name: Create release notes
        env:
          CHANGES: ${{ steps.changelog_reader.outputs.changes }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          echo "$CHANGES" > release_notes.md
          echo "" >> release_notes.md
          cat << 'EOF' >> release_notes.md

          ### 🛡️ Verify Build Authenticity

          This release is cryptographically attested using **GitHub Artifact Attestations**. You can independently verify the signature to ensure the downloaded `Quiper.dmg` was built securely on GitHub Actions and hasn't been modified:

          ```bash
          gh attestation verify Quiper.dmg --repo sassanh/quiper
          ```
          EOF
          echo "" >> release_notes.md
          echo "<!-- BuildNumber: $RUN_NUMBER -->" >> release_notes.md
      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            artifacts/Quiper.dmg
            artifacts/Quiper.app.zip
      - name: Publish Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} artifacts/* \
            --title "Release ${{ github.ref_name }}" \
            --notes-file release_notes.md
