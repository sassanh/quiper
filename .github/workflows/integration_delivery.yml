name: CI/CD

on:
  push:
    branches:
      - main
      - development
    tags:
      - "v*"
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  tests:
    name: Tests
    runs-on: macos-26
    environment:
      name: test
      url: https://app.codecov.io/gh/${{ github.repository }}/
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode 26.1.1
        run: sudo xcode-select -s /Applications/Xcode_26.1.1.app

      - name: Toolchain info
        run: |
          swift --version
          xcodebuild -version

      - name: Run tests with coverage
        run: ./tests-with-coverage.sh -retry-tests-on-failure -test-iterations 2

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.lcov
          fail_ci_if_error: true
          flags: unittests
          root_dir: ${{ github.workspace }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage-html

      - name: Upload Test Result Bundle
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: TestResult.xcresult
          path: build/DerivedData/TestResult.xcresult
          if-no-files-found: ignore

  build:
    name: Build
    runs-on: macos-26
    needs: tests
    steps:
      - uses: actions/checkout@v6
      - name: Set release app version
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          VERSION_BASE=$(git describe --tags --match "v*" --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0")
          SUFFIX=$(if [ "${{ github.event_name }}" == "schedule" ]; then echo "nightly"; else echo "beta"; fi)
          # Clean version base to prevent duplicate suffixes (e.g. beta-beta or nightly-nightly)
          CLEAN_BASE=$(echo "$VERSION_BASE" | sed "s/-$SUFFIX//g; s/$SUFFIX//g")
          if [ -z "$CLEAN_BASE" ]; then
            CLEAN_BASE="0.0.0"
          fi
          echo "APP_VERSION=${CLEAN_BASE}-${SUFFIX}-nonproduction" >>"$GITHUB_ENV"
      - name: Build Swift App
        run: ./build-app.sh
      - name: Create DMG Disk Image
        run: |
          mkdir -p build/dmgstaging
          cp -R Quiper.app build/dmgstaging/
          ln -s /Applications build/dmgstaging/Applications
          hdiutil create -volname "Quiper" -srcfolder build/dmgstaging -ov -format UDZO Quiper.dmg
      - name: Create ZIP Archive
        run: |
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent Quiper.app Quiper.app.zip
      - name: Upload App
        uses: actions/upload-artifact@v7
        with:
          name: app
          path: |
            Quiper.dmg
            Quiper.app.zip
          if-no-files-found: error

  nightly-release:
    if: github.event_name == 'schedule'
    name: Nightly Pre-release
    runs-on: macos-latest
    needs:
      - build
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: app
          path: artifacts
      - name: Generate unique tag
        id: tag
        run: |
          VERSION_BASE=$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || echo "v0.0.0")
          CLEAN_BASE=$(echo "$VERSION_BASE" | sed "s/-nightly//g; s/-beta//g; s/nightly//g; s/beta//g")
          echo "tag=nightly-${CLEAN_BASE}-${{ github.run_number }}" >>"$GITHUB_OUTPUT"
      - name: Create release notes
        env:
          STARTED_AT: ${{ github.run_started_at }}
          SHA: ${{ github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          cat <<EOF >release_notes.md
          **Automated nightly build** from the latest \`main\` branch.

          Built on: $STARTED_AT
          Commit: $SHA

          ⚠️ This is a pre-release build for testing purposes only.
          <!-- BuildNumber: $RUN_NUMBER -->
          EOF
      - name: Create Nightly Pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ steps.tag.outputs.tag }} artifacts/* \
            --title "Quiper Nightly Build (${{ steps.tag.outputs.tag }})" \
            --notes-file release_notes.md \
            --prerelease

  beta-release:
    if: github.event_name == 'workflow_dispatch'
    name: Beta Pre-release
    runs-on: macos-latest
    needs:
      - build
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: app
          path: artifacts
      - name: Generate unique tag
        id: tag
        run: |
          VERSION_BASE=$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || echo "v0.0.0")
          CLEAN_BASE=$(echo "$VERSION_BASE" | sed "s/-nightly//g; s/-beta//g; s/nightly//g; s/beta//g")
          echo "tag=beta-${CLEAN_BASE}-${{ github.run_number }}" >>"$GITHUB_OUTPUT"
      - name: Create release notes
        env:
          STARTED_AT: ${{ github.run_started_at }}
          SHA: ${{ github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          cat << EOF > release_notes.md
          **Manual beta build** for feature testing.

          Built on: $STARTED_AT
          Commit: $SHA

          ⚠️ This is a pre-release build for testing purposes only.
          <!-- BuildNumber: $RUN_NUMBER -->
          EOF
      - name: Create Beta Pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ steps.tag.outputs.tag }} artifacts/* \
            --title "Quiper Beta Build (${{ steps.tag.outputs.tag }})" \
            --notes-file release_notes.md \
            --prerelease

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    name: Publish Release
    runs-on: macos-latest
    needs:
      - build
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: app
          path: artifacts
      - name: Determine Release Version
        id: release_version
        run: echo "value=${GITHUB_REF_NAME#v}" >>"$GITHUB_OUTPUT"
        shell: bash
      - name: Read changelog entry
        id: changelog_reader
        uses: mindsers/changelog-reader-action@v2
        with:
          version: ${{ steps.release_version.outputs.value }}
          path: ./CHANGELOG.md
      - name: Create release notes
        env:
          CHANGES: ${{ steps.changelog_reader.outputs.changes }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          echo "$CHANGES" > release_notes.md
          echo "" >> release_notes.md
          cat << 'EOF' >> release_notes.md

          ### 🛡️ Verify Build Authenticity

          This release is cryptographically attested using **GitHub Artifact Attestations**. You can independently verify the signature to ensure the downloaded `Quiper.dmg` was built securely on GitHub Actions and hasn't been modified:

          ```bash
          gh attestation verify Quiper.dmg --repo sassanh/quiper
          ```
          EOF
          echo "" >> release_notes.md
          echo "<!-- BuildNumber: $RUN_NUMBER -->" >> release_notes.md
      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            artifacts/Quiper.dmg
            artifacts/Quiper.app.zip
      - name: Publish Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} artifacts/* \
            --title "Release ${{ github.ref_name }}" \
            --notes-file release_notes.md
