name: CI/CD

on:
  push:
    branches:
      - main
      - development
    tags:
      - "v*"
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  tests:
    name: Tests
    runs-on: macos-26
    environment:
      name: test
      url: https://app.codecov.io/gh/${{ github.repository }}/
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode 26.1.1
        run: sudo xcode-select -s /Applications/Xcode_26.1.1.app

      - name: Toolchain info
        run: |
          swift --version
          xcodebuild -version

      - name: Run tests with coverage
        run: ./tests-with-coverage.sh -retry-tests-on-failure -test-iterations 2

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.lcov
          fail_ci_if_error: true
          flags: unittests
          root_dir: ${{ github.workspace }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage-html

      - name: Upload Test Result Bundle
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: TestResult.xcresult
          path: build/DerivedData/TestResult.xcresult
          if-no-files-found: ignore

  build:
    name: Build
    runs-on: macos-26
    needs: tests
    steps:
      - uses: actions/checkout@v6
      - name: Set release app version
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          VERSION_BASE=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0")
          SUFFIX=$(if [ "${{ github.event_name }}" == "schedule" ]; then echo "nightly"; else echo "beta"; fi)
          echo "APP_VERSION=${VERSION_BASE}-${SUFFIX}-nonproduction" >>"$GITHUB_ENV"
      - name: Build Swift App
        run: ./build-app.sh
      - name: Compress App
        run: ditto -c -k --sequesterRsrc --keepParent Quiper.app Quiper.app.zip
      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: Quiper.app.zip

      - name: Upload App
        uses: actions/upload-artifact@v7
        with:
          name: app
          path: Quiper.app.zip
          if-no-files-found: error

  nightly-release:
    if: github.event_name == 'schedule'
    name: Nightly Pre-release
    runs-on: macos-latest
    needs:
      - build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: app
          path: artifacts
      - name: Delete previous nightly release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete nightly --yes --cleanup-tag || true
      - name: Create Nightly Pre-release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          tag_name: nightly
          name: Quiper Nightly Build
          body: |
            **Automated nightly build** from the latest `main` branch.

            Built on: ${{ github.run_started_at }}
            Commit: ${{ github.sha }}

            ⚠️ This is a pre-release build for testing purposes only.
            <!-- BuildNumber: ${{ github.run_number }} -->
          prerelease: true
          draft: false

  beta-release:
    if: github.event_name == 'workflow_dispatch'
    name: Beta Pre-release
    runs-on: macos-latest
    needs:
      - build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: app
          path: artifacts
      - name: Delete previous beta release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete beta --yes --cleanup-tag || true
      - name: Create Beta Pre-release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          tag_name: beta
          name: Quiper Beta Build
          body: |
            **Manual beta build** for feature testing.

            Built on: ${{ github.run_started_at }}
            Commit: ${{ github.sha }}

            ⚠️ This is a pre-release build for testing purposes only.
            <!-- BuildNumber: ${{ github.run_number }} -->
          prerelease: true
          draft: false

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    name: Publish Release
    runs-on: macos-latest
    needs:
      - build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: app
          path: artifacts
      - name: Determine Release Version
        id: release_version
        run: echo "value=${GITHUB_REF_NAME#v}" >>"$GITHUB_OUTPUT"
        shell: bash
      - name: Read changelog entry
        id: changelog_reader
        uses: mindsers/changelog-reader-action@v2
        with:
          version: ${{ steps.release_version.outputs.value }}
          path: ./CHANGELOG.md
      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ${{ steps.changelog_reader.outputs.changes }}
            <!-- BuildNumber: ${{ github.run_number }} -->
          draft: false
          prerelease: false
